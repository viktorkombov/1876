<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Априлско въстание 1876</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- Left info sidebar -->
  <aside id="sidebar" class="sidebar" role="complementary" aria-label="Информационен панел">
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <h2 id="sidebar-title" class="sidebar-title"></h2>
        <button id="sidebar-close" class="sidebar-close" aria-label="Затвори панела">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div id="sidebar-content" class="sidebar-content"></div>
      <div id="sidebar-source" class="sidebar-source"></div>
    </div>
  </aside>

  <!-- Layer controls + legend -->
  <div id="controls" class="controls-panel">
    <div class="controls-header">Слоеве</div>
    <div class="controls-body">
      <label class="layer-toggle">
        <input type="checkbox" id="toggle-districts" checked />
        <span class="toggle-swatch toggle-swatch--district"></span>
        Окръзи
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="toggle-points" checked />
        <span class="toggle-swatch toggle-swatch--major"></span>
        Селища
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="toggle-detachments" checked />
        <span class="toggle-swatch toggle-swatch--detachment"></span>
        Чети
      </label>
    </div>
    <div class="controls-legend">
      <div class="legend-label">Легенда</div>
      <div class="legend-item">
        <span class="legend-icon legend-icon--district"></span>
        Окръжен център
      </div>
      <div class="legend-item">
        <span class="legend-icon legend-icon--major"></span>
        Селища
      </div>
      <div class="legend-item">
        <span class="legend-icon legend-icon--detachment"></span>
        Чета
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>

</body>

</html>
